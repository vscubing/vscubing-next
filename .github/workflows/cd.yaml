name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

.env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    environment: production
    runs-on: blacksmith-2vcpu-ubuntu-2204
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        
      - name: Populate .env file
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_CLIENT_ID=${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET=${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_TRUST_HOST=${{ vars.AUTH_TRUST_HOST }}
          AUTH_URL=${{ vars.AUTH_URL }}
          NEXT_PUBLIC_APP_ENV=${{ vars.NEXT_PUBLIC_APP_ENV }}
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # - name: Build with cache
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     cache-from: type=local,src=/tmp/.buildx-cache
      #     cache-to: type=local,dest=/tmp/.buildx-cache
      # - name: 'Build and push Docker image'
      #   run: |
      #     docker build . --tag ghrc.io/${{ github.repository_owner }}/${{ github.repository }}:latest
      #     docker push ghrc.io/${{ github.repository_owner }}/${{ github.repository }}:latest

      # - name: Build and push Docker images
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     # cache-from: type=gha
      #     # cache-to: type=gha,mode=max
      #     # tags: latest
      #     tags: ghrc.io/${{ github.repository }}:latest

      - name: Deploy to Dokploy
        run: | 
          curl --request GET '${{ secrets.DOKPLOY_WEBHOOK }}'
